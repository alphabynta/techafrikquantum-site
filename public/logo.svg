<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 50" width="230" height="50">

  <!-- Outer circle container -->
  <circle cx="25" cy="25" r="22" fill="none" stroke="#f5a524" stroke-width="1.8"/>

  <!-- A-frame: apex (25,6), base corners (11,41) and (39,41) -->
  <line x1="11" y1="41" x2="25" y2="6"  stroke="#f5a524" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="39" y1="41" x2="25" y2="6"  stroke="#f5a524" stroke-width="2.4" stroke-linecap="round"/>

  <!-- T crossbar: extended past the A diagonals -->
  <line x1="10" y1="26" x2="40" y2="26" stroke="#f5a524" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Node dots -->
  <circle cx="25" cy="6"  r="3.5" fill="#f5a524"/>  <!-- apex -->
  <circle cx="11" cy="41" r="3"   fill="#f5a524"/>   <!-- base left -->
  <circle cx="39" cy="41" r="3"   fill="#f5a524"/>   <!-- base right -->
  <circle cx="17" cy="26" r="2.5" fill="#f5a524"/>   <!-- left crossbar junction -->
  <circle cx="33" cy="26" r="2.5" fill="#f5a524"/>   <!-- right crossbar junction -->
  <circle cx="10" cy="26" r="2"   fill="#f5a524"/>   <!-- T-bar left cap -->
  <circle cx="40" cy="26" r="2"   fill="#f5a524"/>   <!-- T-bar right cap -->

  <!-- Wordmark -->
  <text x="58" y="34"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="23" font-weight="700" letter-spacing="0.5"
        fill="#f5a524">TechAfrik</text>

</svg>