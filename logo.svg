<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 40" width="158" height="40">

  <!-- Opening bracket -->
  <path d="M 18,4 L 10,4 L 10,36 L 18,36"
        fill="none" stroke="#f5a524" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- TECH in filled rectangular blocks — 24-show digital style -->
  <g fill="#f5a524">
    <!-- T: top bar + centre stem -->
    <rect x="22" y="7"  width="13" height="3"/>
    <rect x="27" y="10" width="3"  height="19"/>
    <!-- E: left bar + top + mid (short) + bottom -->
    <rect x="37" y="7"  width="3"  height="22"/>
    <rect x="40" y="7"  width="10" height="3"/>
    <rect x="40" y="17" width="8"  height="3"/>
    <rect x="40" y="26" width="10" height="3"/>
    <!-- C: left bar + top + bottom -->
    <rect x="52" y="7"  width="3"  height="22"/>
    <rect x="55" y="7"  width="10" height="3"/>
    <rect x="55" y="26" width="10" height="3"/>
    <!-- H: two verticals + crossbar -->
    <rect x="67" y="7"  width="3"  height="22"/>
    <rect x="79" y="7"  width="3"  height="22"/>
    <rect x="70" y="17" width="9"  height="3"/>
  </g>

  <!-- Afrik in Helvetica, baseline aligned -->
  <text x="83" y="29"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="700"
        textLength="58" lengthAdjust="spacingAndGlyphs"
        fill="#f5a524">Afrik</text>

  <!-- Closing bracket: x = 83 + 58 + 4 = 145 -->
  <path d="M 145,4 L 153,4 L 153,36 L 145,36"
        fill="none" stroke="#f5a524" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>

</svg>